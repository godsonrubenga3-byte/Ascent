# Duo Leveling Covenant System - Android Compilation Workflow
# Compiles React static resources into native Android APK packages using Capacitor

name: Build Mobile App (APK)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Application Dependencies
        run: |
          npm ci || npm install

      - name: Compile Application Web Assets
        run: |
          npm run build
        env:
          NODE_ENV: production

      - name: Initialize and Sync Capacitor Android Project
        run: |
          # Add android platform if it doesn't exist
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Compile Android Release & Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Archive Android Package (APK)
        uses: actions/upload-artifact@v4
        with:
          name: duo-leveling-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
